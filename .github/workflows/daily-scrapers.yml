name: Scrapers Diarios

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  correr-scrapers:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install requests beautifulsoup4 lxml nba_api selenium --break-system-packages

      - name: Correr scrapers
        run: python run_all_scrapers.py
        continue-on-error: true

      - name: Generar predicciones
        run: python scrapers/generate_predictions.py
        continue-on-error: true

      - name: Configurar Git
        run: |
          git config --global user.name "PREDIKTOR Bot"
          git config --global user.email "bot@prediktor.app"

      - name: Commit y push
        run: |
          git add static/ scrapers/static/
          git diff --staged --quiet || git commit -m "chore: stats actualizadas $(date +'%Y-%m-%d')"
          git push
