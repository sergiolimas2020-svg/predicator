name: PREDIKTOR Daily

on:
  schedule:
    # 05:00 UTC = 00:00 Colombia (UTC-5) — al cambiar de día
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Pasar --force a generate_predictions.py (regenera aunque ya haya picks publicados hoy)'
        type: boolean
        default: false

permissions:
  contents: write

# Evita que dos corridas (cron + manual, o dos manuales) se pisen y choquen al
# hacer push a main. Se encolan: una termina antes de que arranque la siguiente.
concurrency:
  group: prediktor-daily
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest

    steps:
      # ── Step 0: Checkout ────────────────────────────────────────
      - name: Clonar repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── Node.js (para tests de paridad Python ↔ JavaScript) ────
      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Step 1: Instalar dependencias (pin de versiones en requirements.txt) ─
      - name: Instalar dependencias pineadas
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt pytest
          echo ""
          echo "── Paquetes instalados ──"
          pip list | grep -E "requests|beautifulsoup|lxml|nba_api|telegram|certifi|pytest"
          echo ""
          echo "── Node version ──"
          node --version

      # ── Step 1b: Validar imports críticos ───────────────────────
      - name: Validar imports críticos
        run: |
          python3 -c "
          import sys
          critical_imports = {
              'requests':    'HTTP client (todos los scrapers)',
              'bs4':         'HTML parsing',
              'lxml':        'parser para bs4',
              'nba_api.stats.endpoints': 'NBA stats',
              'telegram':    'bot Telegram',
              'certifi':     'SSL certs',
          }
          failed = []
          for mod, desc in critical_imports.items():
              try:
                  __import__(mod)
                  print(f'  ✓ {mod} ({desc})')
              except ImportError as e:
                  print(f'  ✗ {mod} ({desc}) — {e}')
                  failed.append(mod)
          if failed:
              print(f'\nFALTAN: {failed}')
              sys.exit(1)
          print('\nTodos los imports OK')
          "

      # ── Step 2: Verificar secrets (CRÍTICO — falla rápido si algo no funciona) ─
      - name: Verificar secrets
        env:
          ODDS_API_KEY:             ${{ secrets.ODDS_API_KEY }}
          TELEGRAM_BOT_TOKEN:       ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID:      ${{ secrets.TELEGRAM_CHANNEL_ID }}
          RAPIDAPI_KEY:             ${{ secrets.RAPIDAPI_KEY }}
          TELEGRAM_ADMIN_CHAT_ID:   ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
          API_FOOTBALL_KEY:         ${{ secrets.API_FOOTBALL_KEY }}
        run: python3 scripts/verify_secrets.py

      # ── Step 2b: Tests de paridad Python ↔ JavaScript (CRÍTICO) ─
      # Si alguien edita prob_futbol() o calculator.js y rompe la
      # paridad, el workflow falla aquí ANTES de generar picks.
      - name: Tests de paridad Python ↔ JS
        id: tests_paridad
        run: pytest tests/test_consistency.py -v --tb=short

      # ── Step 2c: Notificar fallo del test de paridad ────────────
      - name: Notificar test fallido
        if: failure() && steps.tests_paridad.outcome == 'failure'
        env:
          TELEGRAM_BOT_TOKEN:     ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
        run: |
          python3 scripts/notify_telegram.py error \
            --step "tests_paridad" \
            --msg "Test de paridad Python ↔ JS FALLÓ — alguien rompió la coherencia entre prob_futbol() y Calculator.predictWinner(). Revisar generate_predictions.py o calculator.js." \
            --logs-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      # ── Step 3: Registrar resultados de ayer (no crítico) ───────
      - name: Registrar resultados de ayer
        run: python3 scrapers/update_results.py
        continue-on-error: true

      # ── Step 3a-bis: Reporte de calibración (probabilidad vs real) ──
      # Mide si las probabilidades del modelo están calibradas (foso anti-tipster,
      # sin cuotas). Corre DESPUÉS de update_results (necesita picks resueltos).
      - name: Reporte de calibración
        run: python3 scripts/calibration_report.py
        continue-on-error: true

      # ── Step 3b: Generar página historial estática (SEO + AdSense) ─
      # Lee predictions_log.json y reescribe historial.html + patches
      # los contadores del home en index.html (server-rendered).
      - name: Generar página historial
        run: python3 scripts/generate_historial.py
        continue-on-error: true

      # ── Step 4: Fetch cuotas bookmakers (CRÍTICO — sin odds no hay picks) ─
      - name: Fetch cuotas bookmakers
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python3 scrapers/fetch_odds.py

      # ── Step 5: Stats Tracker (no crítico) ──────────────────────
      - name: Generar estadísticas tracker
        run: python3 scrapers/stats_tracker.py
        continue-on-error: true

      # ── Step 6: Estadísticas de ligas — TODO desde API-Football ─────────
      # Reemplaza el scraping frágil de soccerstats (HTML que cambia, 404 por
      # liga, fallos silenciosos) por la API que el proyecto paga. Genera
      # positions + goals + corners en el formato del motor para:
      #   premier, laliga, seriea, bundesliga, ligue1, superlig, champions,
      #   brazil, argentina, colombia.
      # positions/goals usan toda la temporada (de /fixtures, 1 request);
      # --max-fixtures acota SOLO el costo de córners (/fixtures/statistics).
      # Los scrapers de soccerstats quedan en el repo como fallback manual.
      - name: Stats ligas (API-Football)
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python3 scrapers/apifootball_stats.py --all --max-fixtures 120
        continue-on-error: true

      # ── Ligas CONMEBOL de respaldo (ESPN, no soccerstats) ──────────────
      - name: Stats Uruguay
        run: python3 scrapers/uruguay.py
        continue-on-error: true

      - name: Stats Ecuador
        run: python3 scrapers/ecuador.py
        continue-on-error: true

      - name: Stats Chile
        run: python3 scrapers/chile.py
        continue-on-error: true

      - name: Stats Paraguay
        run: python3 scrapers/paraguay.py
        continue-on-error: true

      - name: Stats NBA
        run: python3 scrapers/nba_scraper.py
        continue-on-error: true

      # ── Step 6b: Recolectar datos API-Football (no crítico) ────
      # Insumo del Filtro 1 (forma reciente del favorito) en generate_predictions.
      # Si falla, el motor opera en modo conservador (no filtra).
      # Usa la fecha actual en Colombia (UTC-5) para alinear con `today` del motor.
      - name: Recolectar datos API-Football
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: |
          TODAY=$(TZ='America/Bogota' date +%Y-%m-%d)
          echo "Recolectando datos para $TODAY"
          python3 -m scrapers.api_football.collect_daily "$TODAY"
        continue-on-error: true

      # ── Step 6b-bis: Datos del Mundial 2026 (selecciones) ──────
      # Escribe worldcup_stats.json (forma+Elo de selección) y
      # worldcup_fixtures.json (calendario). Insumo del bloque Mundial
      # de generate_predictions. No crítico: si falla, el motor sigue
      # con clubes/NBA y simplemente no habrá picks del Mundial.
      - name: Datos Mundial 2026
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python3 -m scrapers.worldcup
        continue-on-error: true

      # ── Step 6c: Entrenar calibrador Platt (no crítico) ─────────
      # Reentrena static/calibrator.json con el histórico verificado.
      # Si falla o no hay datos, el motor opera sin calibrar (degradación
      # segura). Corre DESPUÉS de update_results para usar los aciertos
      # de ayer y ANTES del motor para que la calibración esté fresca.
      - name: Entrenar calibrador Platt
        run: python3 scripts/train_calibrator.py
        continue-on-error: true

      # ── Step 7: Generar predicciones (CRÍTICO — sin esto no hay producto) ─
      # Pasa --force solo cuando se dispara manualmente con el toggle activado.
      # El cron normal (schedule) corre sin --force, preservando la protección
      # de "ya publicado" que evita cambiar picks ya enviados al canal.
      - name: Generar predicciones
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            echo "🔄 Modo --force activado (workflow_dispatch)"
            python3 scrapers/generate_predictions.py --force
          else
            python3 scrapers/generate_predictions.py
          fi

      # ── Step 8: Validar que se generó JSON con fecha de hoy ─────
      - name: Validar daily_picks.json
        run: |
          python3 -c "
          import json, sys
          from datetime import datetime, timezone, timedelta
          col_tz = timezone(timedelta(hours=-5))
          today = datetime.now(col_tz).strftime('%Y-%m-%d')
          try:
              data = json.load(open('static/predictions/daily_picks.json'))
              json_date = data.get('date', '?')
              if json_date != today:
                  print(f'✗ daily_picks.json fecha={json_date}, esperaba {today}')
                  sys.exit(1)
              n_picks = ((1 if data.get('pick_dia') else 0)
                       + (1 if data.get('pick_gratuito') else 0)
                       + len(data.get('picks_suscripcion', [])))
              print(f'✓ daily_picks.json OK: fecha={json_date}, picks={n_picks}')
          except Exception as e:
              print(f'✗ Error validando daily_picks.json: {e}')
              sys.exit(1)
          "

      # ── Step 9: Publicar en Telegram (no crítico — bot ya tiene fallback) ─
      - name: Publicar en Telegram
        env:
          TELEGRAM_BOT_TOKEN:      ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID:     ${{ secrets.TELEGRAM_CHANNEL_ID }}
          TELEGRAM_ADMIN_CHAT_ID:  ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
        run: python3 -m bot.publish --force
        continue-on-error: true

      # ── Step 10: Commit y push (CRÍTICO — sin esto no llega a producción) ─
      - name: Commit y push
        run: |
          git config user.name "PREDIKTOR Bot"
          git config user.email "bot@prediktor.app"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/sergiolimas2020-svg/predicator.git
          git add -A
          if git diff --cached --quiet; then
            echo "Sin cambios para commitear"
          else
            git commit -m "chore: update diario $(date '+%Y-%m-%d')"
            # Push resiliente: si main se movió (otra corrida), rebase y reintenta.
            pushed=0
            for i in 1 2 3; do
              if git push origin main; then pushed=1; break; fi
              echo "Push rechazado — rebase sobre main y reintento ($i/3)..."
              git pull --rebase origin main || true
              sleep 3
            done
            if [ "$pushed" != "1" ]; then
              echo "::error::No se pudo pushear tras 3 intentos"; exit 1
            fi
          fi

      # ── Step 11: Notificar éxito a admin ────────────────────────
      - name: Notificar éxito a admin
        if: success()
        env:
          TELEGRAM_BOT_TOKEN:     ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
        run: |
          PICKS=$(python3 -c "
          import json
          d = json.load(open('static/predictions/daily_picks.json'))
          n = (1 if d.get('pick_dia') else 0) + (1 if d.get('pick_gratuito') else 0) + len(d.get('picks_suscripcion', []))
          print(n)
          ")
          DATE=$(python3 -c "
          import json
          print(json.load(open('static/predictions/daily_picks.json'))['date'])
          ")
          python3 scripts/notify_telegram.py success --picks "$PICKS" --date "$DATE"
        continue-on-error: true

      # ── Step 12: Notificar fallo a admin ────────────────────────
      - name: Notificar fallo a admin
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN:     ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
        run: |
          python3 scripts/notify_telegram.py error \
            --step "workflow" \
            --msg "Algún step crítico falló. Revisar logs en GitHub Actions." \
            --logs-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        continue-on-error: true
