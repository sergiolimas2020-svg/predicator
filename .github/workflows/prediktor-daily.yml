name: PREDIKTOR Daily

on:
  schedule:
    # 11:00 UTC = 6:00am Colombia — resultados de anoche listos, picks listos antes de despertar
    - cron: '0 11 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests beautifulsoup4 lxml nba_api

      # PASO 1: Registrar resultados de los partidos de ayer (ESPN)
      - name: Registrar resultados
        run: python3 scrapers/update_results.py
        continue-on-error: true

      - name: Generar estadísticas
        run: python3 scrapers/stats_tracker.py
        continue-on-error: true

      # PASO 2: Actualizar estadísticas de todas las ligas
      - name: Stats Colombia
        run: python3 scrapers/colombia.py
        continue-on-error: true

      - name: Stats Argentina
        run: python3 scrapers/argentina.py
        continue-on-error: true

      - name: Stats Premier League
        run: python3 scrapers/premier.py
        continue-on-error: true

      - name: Stats La Liga
        run: python3 scrapers/españa.py
        continue-on-error: true

      - name: Stats Serie A
        run: python3 scrapers/italia.py
        continue-on-error: true

      - name: Stats Bundesliga
        run: python3 scrapers/bundesliga.py
        continue-on-error: true

      - name: Stats Ligue 1
        run: python3 scrapers/francia.py
        continue-on-error: true

      - name: Stats Brasileirao
        run: python3 scrapers/brazil.py
        continue-on-error: true

      - name: Stats Champions League
        run: python3 scrapers/champions.py
        continue-on-error: true

      # PASO 3: Generar picks del día con datos frescos
      - name: Generar predicciones
        run: python3 scrapers/generate_predictions.py

      # PASO 4: Publicar todos los cambios
      - name: Commit y push
        run: |
          git config user.name "PREDIKTOR Bot"
          git config user.email "bot@prediktor.app"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/sergiolimas2020-svg/predicator.git
          git add -A
          git diff --cached --quiet && echo "Sin cambios" || git commit -m "chore: update diario $(date '+%Y-%m-%d')"
          git pull --rebase origin main
          git push origin main
