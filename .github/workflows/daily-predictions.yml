name: Predicciones Diarias

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  generar-predicciones:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests

      - name: Generar predicciones
        env:
          BALLDONTLIE_KEY: ${{ secrets.BALLDONTLIE_KEY }}
        run: python scrapers/generate_predictions.py

      - name: Configurar Git
        run: |
          git config --global user.name "PREDIKTOR Bot"
          git config --global user.email "bot@prediktor.app"

      - name: Commit y push si hay cambios
        run: |
          git add static/predictions/ sitemap.xml robots.txt
          git diff --staged --quiet || git commit -m "chore: predicciones $(date +'%Y-%m-%d')"
          git push
          git stash
          git pull --rebase origin main
          git stash pop
          git push
