name: Predicciones Diarias
on:
  schedule:
    - cron: '30 10 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generar-predicciones:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests

      - name: Generar predicciones
        run: python scrapers/generate_predictions.py

      - name: Configurar Git
        run: |
          git config --global user.name "PREDIKTOR Bot"
          git config --global user.email "bot@prediktor.app"

      - name: Commit y push
        run: |
          git add static/predictions/ sitemap.xml robots.txt
          git diff --staged --quiet || git commit -m "chore: predicciones $(date +'%Y-%m-%d')"
          git pull --rebase origin main
          git push
