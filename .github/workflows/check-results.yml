name: Check Results

on:
  schedule:
    - cron: '0 9 * * *'  # 9am UTC = 4am Colombia, antes del scraper de predicciones
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install requests certifi
      - run: cd scrapers && python3 check_results.py
        working-directory: ${{ github.workspace }}
      - run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add static/predictions_log.json static/historial.json
          git diff --staged --quiet || git commit -m "chore: actualizar historial de aciertos $(date +'%Y-%m-%d')"
          git push
