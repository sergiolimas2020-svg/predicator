<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Acceso VIP — PREDIKTOR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#0a0a0f; --panel:#16161f; --line:#2a2a3a; --gold:#f0b429; --text:#e8edf5; --muted:#94a3b8; --red:#ef4444; --green:#22c55e; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { min-height:100vh; display:grid; place-items:center; padding:1.5rem; background:var(--bg); color:var(--text); font-family:"DM Sans",sans-serif; }
    .login-card { width:min(100%, 470px); background:var(--panel); border:1px solid rgba(240,180,41,0.28); border-radius:8px; padding:2rem; box-shadow:0 24px 70px rgba(0,0,0,0.42); }
    .logo { font-family:"Bebas Neue",sans-serif; letter-spacing:3px; font-size:2rem; color:var(--text); text-decoration:none; }
    .logo span, h1 span { color:var(--gold); }
    h1 { font-family:"Bebas Neue",sans-serif; font-size:clamp(2.4rem, 10vw, 4rem); line-height:.95; margin:1.4rem 0 .7rem; letter-spacing:1px; }
    p { color:var(--muted); line-height:1.6; }
    form { margin-top:1.5rem; display:grid; gap:.9rem; }
    label { font-size:.78rem; text-transform:uppercase; letter-spacing:.14em; color:var(--muted); font-weight:700; }
    input { width:100%; border:1px solid var(--line); border-radius:6px; background:#0f0f16; color:var(--text); font:inherit; padding:1rem; }
    input:focus { outline:none; border-color:var(--gold); }
    button, .secondary { display:inline-flex; align-items:center; justify-content:center; min-height:46px; border-radius:6px; font-weight:800; text-decoration:none; cursor:pointer; }
    button { border:0; background:var(--gold); color:#111118; font:inherit; }
    .secondary { border:1px solid var(--line); color:var(--muted); margin-top:.75rem; }
    .status { min-height:1.4rem; font-size:.9rem; color:var(--red); }
    .status.ok { color:var(--green); }
    .note { margin-top:1.1rem; font-size:.86rem; }
  </style>
</head>
<body>
  <main class="login-card">
    <a class="logo" href="/">PREDI<span>KTOR</span></a>
    <h1>Acceso <span>VIP</span></h1>
    <p>Ingresa tu contraseña Pro del mes para desbloquear las herramientas de PREDIKTOR.</p>
    <form id="vip-form">
      <div>
        <label for="password">Contraseña mensual</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required autofocus>
      </div>
      <button type="submit">Entrar al VIP</button>
      <div id="status" class="status" role="status"></div>
    </form>
    <a class="secondary" href="/plan-pro">Ver Plan Pro</a>
    <p class="note">Si ya pagaste y no tienes acceso, escríbenos a <a href="https://t.me/prediktorcol" style="color:var(--gold);">soporte</a>.</p>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const statusEl = document.getElementById("status");
    if (params.get("error") === "config") {
      statusEl.textContent = "Falta configurar VIP_PASSWORD en el servidor.";
    }

    document.getElementById("vip-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      statusEl.textContent = "Validando acceso...";
      statusEl.className = "status";
      const password = document.getElementById("password").value;
      try {
        const response = await fetch("/api/vip-login", {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: new URLSearchParams({ password })
        });
        if (!response.ok) throw new Error("Contraseña incorrecta");
        localStorage.setItem("prediktor_vip_unlocked", "1");
        statusEl.textContent = "Acceso concedido.";
        statusEl.className = "status ok";
        const next = params.get("next") || "/vip";
        window.location.href = next.startsWith("/") ? next : "/vip";
      } catch (error) {
        statusEl.textContent = error.message || "No se pudo validar el acceso.";
      }
    });
  </script>
</body>
</html>
